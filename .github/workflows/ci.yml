name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: check + unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm test

  build:
    name: build (next build)
    runs-on: ubuntu-latest
    env:
      # next build renders dynamic routes at request time, so real Supabase
      # creds aren't needed — dummy values satisfy the non-null env reads.
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_ci_dummy
      SUPABASE_SECRET_KEY: sb_secret_ci_dummy
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  e2e:
    name: e2e (public smoke)
    runs-on: ubuntu-latest
    env:
      # The smoke only boots the app and hits public routes; the middleware
      # constructs a Supabase client but makes no network call without a
      # session, so dummy creds suffice (no live Supabase needed).
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_ci_dummy
      SUPABASE_SECRET_KEY: sb_secret_ci_dummy
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm exec playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
