name: Security

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege default; jobs widen only what they need.
permissions:
  contents: read

# NOTE: no CodeQL job — code scanning requires GitHub Advanced Security, which is
# not available on private repos without a paid plan. gitleaks (secrets) + pnpm
# audit (dependency CVEs) are the security surface here.
jobs:
  gitleaks:
    name: secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so gitleaks can scan past commits
      - uses: gitleaks/gitleaks-action@v3
        env:
          # Free for personal-account repos — no license key required.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  audit:
    name: dependency audit (pnpm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Hard gate on PRODUCTION deps (what actually ships): fails on high/critical.
      - run: pnpm audit --prod --audit-level=high
      # Full audit incl. devDeps — informational only, never fails the build.
      - run: pnpm audit --audit-level=high || true
