name: Security

on:
  push:
    branches: [master]
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # weekly, Monday 06:00 UTC (CodeQL)

# Least-privilege default; jobs widen only what they need.
permissions:
  contents: read

jobs:
  gitleaks:
    name: secret scan (gitleaks)
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so gitleaks can scan past commits
      - uses: gitleaks/gitleaks-action@v3
        env:
          # Free for personal-account repos — no license key required.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  audit:
    name: dependency audit (pnpm)
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Hard gate on PRODUCTION deps (what actually ships): fails on high/critical.
      - run: pnpm audit --prod --audit-level=high
      # Full audit incl. devDeps — informational only, never fails the build.
      - run: pnpm audit --audit-level=high || true

  codeql:
    name: CodeQL (javascript-typescript)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-extended
      # No build step needed for JS/TS — CodeQL extracts from source.
      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"
